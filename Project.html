<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        .carousel,
        .carousel-inner,
        .carousel-item {
            height: 100vh;
            width: 100vw;
        }

        .carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .carousel-item img {
            height: 100vh;
            width: 100vw;
            object-fit: cover;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
        }
        
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
    </style>


    <title>DOTA 2 STATISTICS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    
    <script type = "text/javascript">
        function search()
        {
            steamID = document.getElementById("sID").value;
            localStorage.setItem("ID", steamID);
            window.location.href = "https://mykhailoroshchupkin.github.io/Players.html";
        }
    </script>

</head>


<body>

    <!-- NAVBAR -->
    <div class="ui-layer">
        <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">DOTA 2 STATISTICS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">   
                        <a class="nav-link" href="https://mykhailoroshchupkin.github.io/Project">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://mykhailoroshchupkin.github.io/ProPlayers">Pro Players</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input id ="sID" class="form-control me-2" type="search" placeholder="Player ID" aria-label="Search"/>
                    <button class="btn btn-outline-success" type="button" onclick="search()">Search</button>
                </form>
                </div>
            </div>
        </nav>
    </div>
    <!-- /NAVBAR -->



    <!-- IMAGES -->
    <div class="bg-layer">
        <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active " data-bs-interval="5000">
                <img src="342127.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item" data-bs-interval="5000">
                <img src="396395.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item" data-bs-interval="5000">
                <img src="473330.jpg" class="d-block w-100" alt="...">
                </div>
            </div>
        </div>
    </div>
    <!-- /IMAGES -->

    
</body>
</html>
