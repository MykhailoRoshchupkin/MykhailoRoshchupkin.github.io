<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

	<script type = "text/javascript">
        function reg()
        {
            var name = document.getElementById("fname");
            var lastname = document.getElementById("lname");
		    var login = document.getElementById("loginbox");
            var password = document.getElementById("passbox");
            var mail = document.getElementById("email");
            var birth = document.getElementById("dbirth");

            if (name.value == "" || lastname.value == "" || login.value == "" || password.value == "" || mail.value == "" || birth.value == "")
            {
                alert("All fields must be present.");
            }
            else
            {
                var passtext = password.value;
                var len = passtext.length;
                var check = false;
                for (var i = 0; i < len; i+=1)
                {
                    if (passtext.charAt(i) == '!' || passtext.charAt(i) == "?")
                    {
                        check = true;
                    }
                }
                if (check == false)
                {
                    password.style.color = "red"; 
                    alert("Password must contain a special character.");
                    password.value = "asterics";
                }
                else
                {
                    password.style.color = "black"; 
                    alert("Registration successfull!");
                    var register = document.getElementById("regg");
                    register.remove();
                    var s = "";
                    for (var i = 0; i < len;i +=1)
                    {
                        s += '*';
                    }
                    password.value = s;
                    name.disabled = true;
                    lastname.disabled = true;
                    login.disabled = true;
                    password.disabled = true;
                    mail.disabled = true;
                    birth.disabled = true;
                    var message1 = document.getElementById("wel");
                    message1.textContent = "Successfull!";
                    var message2 = document.getElementById("pag");
                    message2.textContent = "Thank you for registering on our page. You can use it freely now!";
                }
            }
        }

    </script>
</head>
<body>
    <div class="container p-5">
        <div id="info">
            <h1> <span id="wel">WELCOME</span></h1> <br>
            <h3> <span id="pag">Please register, prior to visiting our coding contest page!</span></h3> <br>
        </div>
        <table class="table">
            <tbody>
            <tr>
                <td><span id="logtext">First Name</span></td>
                <td><input id="fname" type="text" /></td>
            </tr>
            <tr>
                <td><span id="logtext">Last Name</span></td>
                <td><input id="lname" type="text" /></td>
            </tr>
            <tr>
                <td><span id="logtext">LOGIN</span></td>
                <td><input id="loginbox" type="text" /></td>
            </tr>
            <tr>
                <td><span id="passtext">PASSWORD </span></td>
                <td><input id="passbox" type="text" /></td>
            </tr>
            <tr>
                <td><span id="logtext">Email    </span></td>
                <td><input id="email" type="text" /></td>
            </tr>
            <tr>
                <td><span id="logtext">Date Of Birth    </span></td>
                <td><input id="dbirth" type="text" /></td>
            </tr>
            </tbody>
        </table>
        
        
        <button onclick="reg();" id="regg">REGISTER </button>
        
        
    </div>
</body>
</html>
