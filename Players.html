<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        .carousel,
        .carousel-inner,
        .carousel-item {
            height: 100vh;
            width: 100vw;
        }

        .carousel {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .carousel-item img {
            height: 100vh;
            width: 100vw;
            object-fit: cover;
        }

    <title>DOTA 2 STATISTICS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    
    <script type = "text/javascript">
        player = [];
        function search()
        {
            steamID = document.getElementById("sID").value;
            localStorage.setItem("ID", steamID);
            window.location.href = "https://mykhailoroshchupkin.github.io/Players.html";
        }



        async function GetData() 
        {
            steamID64 = localStorage.getItem("ID");
            steamID = BigInt(steamID64) - BigInt("76561197960265728");
            const url = 'https://api.opendota.com/api/players/' + steamID.toString();
            const options =
            {
            method: 'GET',
            };
            const response = await fetch(url, options);
            const result = await response.text();
            const myObj = JSON.parse(result);
            player["rank_tier"] = myObj["rank_tier"];
            player["leaderboard_rank"] = myObj["leaderboard_rank"];
            player["name"] = myObj["profile"]["name"];
            player["avatarfull"] = myObj["profile"]["avatarfull"];
            player["profileurl"] = myObj["profile"]["profileurl"];
            player["last_login"] = myObj["profile"]["last_login"];
            player["loccountrycode"] = myObj["profile"]["loccountrycode"];


            const url1 = 'https://api.opendota.com/api/players/' + steamID.toString() + "/wl";
            const options1 =
            {
            method: 'GET',
            };
            const response1 = await fetch(url1, options1);
            const result1 = await response1.text();
            const myObj1 = JSON.parse(result1);
            player["win"] = myObj1["win"];
            player["lose"] = myObj1["lose"];
        }
        function Inspect()
        {
            window.location.href = player["profileurl"];
        }
        function Fill()
        {
            document.getElementById("avatarfull").src =  player["avatarfull"];
            document.getElementById("name").textContent =  "NickName: " + player["name"];
            document.getElementById("rank_tier").textContent = "Profile rank: " + player["rank_tier"];
            document.getElementById("loccountrycode").textContent = "Country: " + player["loccountrycode"];
            document.getElementById("last_login").textContent = "Last Login: " + player["last_login"];
            document.getElementById("leaderboard_rank").textContent = "LeaderBoard Rank: " + player["leaderboard_rank"];
            document.getElementById("win").textContent = "Wins: " + player["win"];
            document.getElementById("lose").textContent = "Loses: " + player["lose"];
        }
        async function main() 
        {
            await GetData();
            Fill();
        }

        window.onload = main;
    </script>

</head>


<body>


    <!-- NAVBAR -->
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">

                </li>
            </ul>
            <form class="d-flex" role="search">
                <input id ="sID" class="form-control me-2" type="search" placeholder="Player ID" aria-label="Search"/>
                <button class="btn btn-outline-success" type="button" onclick="search()">Search</button>
            </form>
            </div>
        </div>
    </nav>

     <div class ="row">
        <div class = "col-5">

            <div class="card col-2" >
                <img id = "avatarfull" src="..." class="card-img-top" alt="..." id = "avatarfull0">
