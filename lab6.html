<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

<script type = "text/javascript">
    async function GetData() 
    {
        const url = 'https://brianobruno.github.io/cats.json';
        const options =
        {
        method: 'GET',
        };
        const response = await fetch(url, options);
        const result = await response.text();
        const myObj = JSON.parse(result);
        var facts = [];
        for (const x in myObj["facts"])
        {
            facts[myObj["facts"][x]["factId"]] = myObj["facts"][x]["text"];
        }
        var table = document.createElement("table");
        var hrow = document.createElement("tr");
        var th1 = document.createElement("th");
        var th2 = document.createElement("th");
        th1.style.border = "1px solid black";
        th2.style.border = "1px solid black";
        th1.textContent = "FactId";
        hrow.appendChild(th1);
        th2.textContent = "Fact";
        hrow.appendChild(th2);
        
        table.appendChild(hrow);

        for (var x in facts)
        {
            var row = document.createElement("tr");
            var th11 = document.createElement("th");
            var th22 = document.createElement("th");
            th11.style.border = "1px solid black";
            th22.style.border = "1px solid black";
            th11.textContent = x;
            th22.textContent = facts[x];
            row.appendChild(th11);
            row.appendChild(th22);
            table.appendChild(row);
        }
        document.getElementById("main").appendChild(table);
    }
</script>
</head>


<body>
    <div class="container p-5" id = "main">
        <button onclick="GetData();" id="start">GetData </button>
    </div>
    
</body>
</html>
